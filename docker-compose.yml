version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: mycelio
      POSTGRES_USER: mycelio
      POSTGRES_PASSWORD: mycelio_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://mycelio:mycelio_dev@postgres:5432/mycelio
      API_PORT: '3001'
      API_KEY: ${API_KEY:-dev-api-key}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
    ports:
      - '3001:3001'
    depends_on:
      - postgres

  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
    ports:
      - '3000:80'
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - dashboard

volumes:
  pgdata:
  caddy_data:
  caddy_config:
